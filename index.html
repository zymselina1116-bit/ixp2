	<canvas id="confetti-canvas"></canvas>

	<script>
	/* ── Footer fade on scroll ── */
	(function () {
		var footer = document.querySelector('.bg-footer');
		window.addEventListener('scroll', function () {
			var opacity = Math.max(0, 1 - window.scrollY / 150);
			footer.style.opacity = opacity;
		});
	})();
	</script>

	<script>
	(function () {
		var canvas = document.getElementById('confetti-canvas');
		var ctx    = canvas.getContext('2d');
		var animId = null;
		var COLORS = ['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#FF9FF3',
		              '#54A0FF','#C56BFF','#00D2D3','#1DD1A1','#FF6348'];

		function resize() {
			canvas.width  = window.innerWidth;
			canvas.height = window.innerHeight;
		}
		resize();
		window.addEventListener('resize', resize);

		function Ribbon() { this.init(true); }
		Ribbon.prototype.init = function (spread) {
			this.x     = Math.random() * canvas.width;
			this.y     = spread ? Math.random() * canvas.height
			                    : canvas.height + 10 + Math.random() * 80;
			this.w     = 5 + Math.random() * 9;
			this.h     = 16 + Math.random() * 26;
			this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
			// random direction: full 360°, speed 1.5–4
			var speed  = 1.5 + Math.random() * 2.5;
			var dir    = Math.random() * Math.PI * 2;
			this.vx    = Math.cos(dir) * speed;
			this.vy    = Math.sin(dir) * speed;
			this.angle = Math.random() * Math.PI * 2;
			this.angV  = (Math.random() - 0.5) * 0.1;
			this.wave  = Math.random() * Math.PI * 2;
		};
		Ribbon.prototype.update = function () {
			this.wave  += 0.055;
			this.x     += this.vx + Math.sin(this.wave) * 0.4;
			this.y     += this.vy;
			this.angle += this.angV;
			// respawn when it drifts off any edge
			var W = canvas.width, H = canvas.height;
			if (this.x < -60 || this.x > W + 60 || this.y < -60 || this.y > H + 60) {
				this.init(false);
			}
		};
		Ribbon.prototype.draw = function () {
			ctx.save();
			ctx.translate(this.x, this.y);
			ctx.rotate(this.angle);
			ctx.fillStyle = this.color;
			ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
			ctx.restore();
		};

		var ribbons = [];
		for (var i = 0; i < 110; i++) ribbons.push(new Ribbon());

		function loop() {
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			ribbons.forEach(function (r) { r.update(); r.draw(); });
			animId = requestAnimationFrame(loop);
		}
		function start() { if (!animId) loop(); }
		function stop()  {
			if (animId) { cancelAnimationFrame(animId); animId = null; }
			ctx.clearRect(0, 0, canvas.width, canvas.height);
		}

		canvas.addEventListener('transitionend', function () {
			if (parseFloat(canvas.style.opacity) === 0) stop();
		});

		window.addEventListener('scroll', function () {
			var ratio = window.scrollY / (document.body.scrollHeight - window.innerHeight);
			if (ratio > 0.82) {
				start();
				canvas.style.opacity = '1';
			} else {
				canvas.style.opacity = '0';
			}
		});
	})();
	</script>
